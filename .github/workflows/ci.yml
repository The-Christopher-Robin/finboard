name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [client, server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.dir }}
      - run: npx tsc --noEmit
        working-directory: ${{ matrix.dir }}

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm test
        working-directory: client

  cypress:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finboard
          POSTGRES_PASSWORD: finboard
          POSTGRES_DB: finboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: server
      - run: npm ci
        working-directory: client
      - name: Run migrations and seed
        working-directory: server
        env:
          DATABASE_URL: postgresql://finboard:finboard@localhost:5432/finboard
        run: |
          npx tsx src/db/migrate.ts
          npx tsx src/db/seed.ts
      - name: Start server
        working-directory: server
        env:
          DATABASE_URL: postgresql://finboard:finboard@localhost:5432/finboard
          PORT: '4000'
          WS_PORT: '4001'
        run: npx tsx src/index.ts &
      - name: Run Cypress
        working-directory: client
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:3000
