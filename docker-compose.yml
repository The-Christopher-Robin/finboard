version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finboard
      POSTGRES_PASSWORD: finboard
      POSTGRES_DB: finboard
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finboard']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
      - '4001:4001'
    environment:
      DATABASE_URL: postgresql://finboard:finboard@db:5432/finboard
      PORT: '4000'
      WS_PORT: '4001'
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - server

volumes:
  pgdata:
